<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICI</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  *:focus,
  *:focus-visible,
  *:focus-within {
    outline: none!important;
    -webkit-tap-highlight-color: transparent!important;
    -webkit-focus-ring-color: transparent!important;
  }

  body {
    font-family: 'Roboto', sans-serif;
    background: radial-gradient(ellipse at top, #1a1d29 0%, #0a0e14 50%, #000000 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 20px 40px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(0, 150, 255, 0.08), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.08), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .tv-container {
    position: relative;
    z-index: 1;
    max-width: 1920px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .menu-toggle {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
    transition: 0.2s;
  }

  .menu-toggle:hover {
    background: rgba(255,255,255,0.15);
    transform: scale(1.05);
  }

  .menu-toggle span {
    width: 18px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
  }

  .logo {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(90deg, #00d4ff, #0099ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 8px rgba(0, 212, 255, 0.3));
  }

  .header-info {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .time {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .weather {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 20px;
    opacity: 0.9;
  }

  .section-title {
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .app-card {
    aspect-ratio: 16/9;
    border-radius: 12px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(40px) saturate(180%);
  }

  .app-card[data-img]::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: var(--card-img);
    background-size: cover;
    background-position: center;
    opacity: 0.3;
    z-index: 0;
  }

  .app-card[data-img] .app-icon,
  .app-card[data-img] .app-name {
    position: relative;
    z-index: 1;
  }

  .app-card:hover {
    transform: scale(1.02);
    border-color: rgba(255, 255, 255, 0.3);
  }

  .app-card:focus-visible {
    transform: scale(1.02);
    border-color: rgba(255, 255, 255, 0.4);
  }

  .app-icon {
    font-size: 48px;
    margin-bottom: 8px;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
  }

  .app-name {
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
  }

  .netflix { background: linear-gradient(135deg, #ff416c, #ff4b2b)!important; }
  .youtube { background: linear-gradient(135deg, #f7971e, #ffd200)!important; }
  .prime { background: linear-gradient(135deg, #00c6ff, #0072ff)!important; }
  .globoplay { background: linear-gradient(135deg, #8e2de2, #4a00e0)!important; }
  .disney { background: linear-gradient(135deg, #0575e6, #021b79)!important; }
  .spotify { background: linear-gradient(135deg, #00b09b, #96c93d)!important; }

  .banner {
    width: 100%;
    height: 28vh;
    max-height: 260px;
    min-height: 180px;
    background: rgba(30, 30, 40, 0.5);
    backdrop-filter: blur(30px) saturate(180%);
    border-radius: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    padding: 24px 40px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: var(--banner-img);
    background-size: cover;
    background-position: center;
    opacity: 0.4;
    z-index: 0;
    border-radius: 16px;
  }

  .banner[data-bg] {
    background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
  }

  .banner-content {
    max-width: 600px;
    z-index: 1;
    position: relative;
  }

  .banner-title {
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .banner-desc {
    font-size: 16px;
    opacity: 0.9;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .banner-btn {
    padding: 10px 24px;
    background: linear-gradient(135deg, #00d4ff, #0099ff);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .banner-btn:hover {
    transform: scale(1.02);
  }

  .banner-btn:active {
    transform: scale(0.98);
  }

  .player-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .player-overlay.active {
    display: flex;
  }

  .player-wrapper {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: #000;
    border-radius: 0;
    overflow: hidden;
  }

  #videoPlayer {
    width: 100%;
    height: 100%;
    background: #000;
    object-fit: cover;
    border: 0!important;
  }

  video::-webkit-media-controls {
    display: none!important;
  }

  .player-menu {
    position: absolute;
    top: 12px;
    left: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 10001;
  }

  .player-menu.active {
    opacity: 1;
    pointer-events: all;
  }

  .menu-btn {
    width: 24px;
    height: 24px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    color: rgba(255, 255, 255, 0.8);
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .menu-btn:hover,.menu-btn:focus {
    background: rgba(0, 212, 255, 0.4);
    border-color: #00d4ff;
    color: #fff;
    transform: scale(1.1);
  }

  .player-info {
    position: absolute;
    top: 12px;
    left: 44px;
    color: #fff;
    font-size: 12px;
    background: rgba(0, 0, 0, 0.5);
    padding: 4px 10px;
    border-radius: 3px;
    opacity: 0;
    transition: 0.3s;
    pointer-events: none;
  }

  .player-wrapper:hover .player-info {
    opacity: 1;
  }

  .sidebar {
    position: fixed;
    top: 0;
    left: -320px;
    width: 320px;
    height: 100vh;
    background: rgba(15, 18, 26, 0.98);
    backdrop-filter: blur(40px) saturate(180%);
    border-right: 1px solid rgba(255,255,255,0.1);
    z-index: 10000;
    transition: left 0.3s ease;
    overflow-y: auto;
    padding: 20px 0;
  }

  .sidebar.active {
    left: 0;
  }

  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .sidebar-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .sidebar-header {
    padding: 0 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sidebar-title {
    font-size: 20px;
    font-weight: 600;
  }

  .sidebar-close {
    width: 28px;
    height: 28px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .sidebar-item {
    padding: 14px 20px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
  }

  .sidebar-item:hover {
    background: rgba(255,255,255,0.08);
  }

  .sidebar-item.active {
    background: rgba(0, 212, 255, 0.15);
    border-left: 3px solid #00d4ff;
  }

  .sidebar-arrow {
    font-size: 12px;
    opacity: 0.6;
  }

  .submenu {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: rgba(0,0,0,0.3);
  }

  .submenu.active {
    max-height: 500px;
  }

  .submenu-item {
    padding: 12px 20px 12px 40px;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.8;
    transition: 0.2s;
  }

  .submenu-item:hover {
    background: rgba(255,255,255,0.05);
    opacity: 1;
  }

  @media (max-width: 1280px) {
    body { padding: 16px 24px; }
    .apps-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .banner { height: 25vh; padding: 20px 24px; }
    .banner-title { font-size: 24px; }
    .banner-desc { font-size: 14px; }
  }

  @media (max-width: 1366px) {
    .app-card,.banner {
      backdrop-filter: none;
    }
  }
</style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Menu</div>
      <button class="sidebar-close" id="sidebarClose">×</button>
    </div>
    
    <div class="sidebar-item" data-submenu="config">
      <span>Configurações</span>
      <span class="sidebar-arrow">▶</span>
    </div>
    <div class="submenu" id="submenu-config">
      <div class="submenu-item" data-link="https://seu-link-de-pagamento.com">Pagamento</div>
    </div>
  </div>

  <div class="tv-container">
    <div class="header">
      <div class="header-left">
        <button class="menu-toggle" id="menuToggle">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="logo">ICI</div>
      </div>
      <div class="header-info">
        <div class="time" id="time">20:45</div>
        <div class="weather">☀️ 28°C</div>
      </div>
    </div>

    <div class="banner" data-bg="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1200">
      <div class="banner-content">
        <h1 class="banner-title">Destaque da Semana</h1>
        <p class="banner-desc">Assista aos melhores filmes e séries. Novos lançamentos toda semana.</p>
        <button class="banner-btn" data-url="https://test-streams.mux.dev/x36xhzz.m3u8">Assistir Agora</button>
      </div>
    </div>

    <h2 class="section-title">Canais</h2>
    <div class="apps-grid">
      <div class="app-card netflix" tabindex="0" data-url="https://d25usgadhphvwi.cloudfront.net/hls/stv-plus-640x360/playlist.m3u8" data-stream="true">
        <div class="app-icon">CNN</div>
        <div class="app-name">CNN Brasil</div>
      </div>

      <div class="app-card youtube" tabindex="0" data-url="https://d03ae6b5c6724c24867e97a3dc04934a.mediatailor.us-west-2.amazonaws.com/v1/master/ba62fe743df0fe93366eba3a257d792884136c7f/LINEAR-1026-WORBBRPTFAST-WHALETVPLUS/1026/hls/master/playlist.m3u8" data-stream="true">
        <div class="app-icon">Sport</div>
        <div class="app-name">RED BULL</div>
      </div>

      <div class="app-card prime" tabindex="0" data-url="https://cdn-5.nxplay.com.br/VEJA_PLUS_FAST/tracks-v1a1/mono.ts.m3u8" data-stream="true">
        <div class="app-icon">VEJA</div>
        <div class="app-name">VEJA+</div>
      </div>

      <div class="app-card globoplay" tabindex="0" data-url="https://sbtnews.maissbt.com/3.m3u8" data-stream="true">
        <div class="app-icon">SBT</div>
        <div class="app-name">SBT News HD</div>
      </div>

      <div class="app-card disney" tabindex="0" data-url="https://cis-no-samsung.otteravision.com/cis/no/no_h265.m3u8" data-stream="true">
        <div class="app-icon">NV</div>
        <div class="app-name">Novelas BR</div>
      </div>

      <div class="app-card spotify" tabindex="0" data-url="https://a-cdn.klowdtv.com/live1/cine_720p/playlist.m3u8" data-stream="true">
        <div class="app-icon">Cine</div>
        <div class="app-name">Sony</div>
      </div>

      <div class="app-card spotify" tabindex="0" data-url="https://amg00740-sofa-amg00740c7-lg-br-7305.playouts.now.amagi.tv/1080p-cc-hevc/index.m3u8" data-stream="true">
        <div class="app-icon">PuraTV</div>
        <div class="app-name"></div>
      </div>

      <div class="app-card spotify" tabindex="0" data-url="https://cdn-uw2-prod.tsv2.amagi.tv/linear/amg00353-lionsgatestudio-moviespherebrazil-runtimelatam/playlist.m3u8" data-stream="true">
        <div class="app-icon"></div>
        <div class="app-name">MovieSphere</div>
      </div>

      <div class="app-card spotify" tabindex="0" data-url="https://appletree-mytime-samsungbrazil.amagi.tv/playlist.m3u8" data-stream="true">
        <div class="app-icon"></div>
        <div class="app-name">MyTime</div>
      </div>

    </div>
  </div>

  <div class="player-overlay" id="playerOverlay">
    <div class="player-wrapper">
      <video id="videoPlayer" autoplay></video>
      <div class="player-info" id="playerInfo"></div>

      <div class="player-menu" id="playerMenu">
        <button class="menu-btn" id="backHomeBtn" tabindex="0" title="Voltar">
         ←
        </button>
      </div>
    </div>
  </div>

<script>
  function updateTime() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('time').textContent = `${hours}:${minutes}`;
  }
  updateTime();
  setInterval(updateTime, 60000);

  const playerOverlay = document.getElementById('playerOverlay');
  const videoPlayer = document.getElementById('videoPlayer');
  const playerMenu = document.getElementById('playerMenu');
  const backHomeBtn = document.getElementById('backHomeBtn');
  const playerInfo = document.getElementById('playerInfo');
  let hls = null;
  let menuTimeout = null;

  function showMenu() {
    playerMenu.classList.add('active');
    setTimeout(() => {
      backHomeBtn.focus();
    }, 50);
    clearTimeout(menuTimeout);
    menuTimeout = setTimeout(hideMenu, 4000);
  }

  function hideMenu() {
    playerMenu.classList.remove('active');
    videoPlayer.focus();
  }

  function openPlayer(url, appName) {
    playerOverlay.classList.add('active');
    playerInfo.textContent = `Carregando: ${appName}`;

    if (Hls.isSupported()) {
      if (hls) hls.destroy();
      hls = new Hls({ enableWorker: true });
      hls.loadSource(url);
      hls.attachMedia(videoPlayer);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        videoPlayer.play();
        playerInfo.textContent = `Reproduzindo: ${appName}`;
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          playerInfo.textContent = `Erro: canal indisponível`;
          setTimeout(closePlayer, 2000);
          hls.destroy();
        }
      });
    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
      videoPlayer.src = url;
      videoPlayer.play();
      playerInfo.textContent = `Reproduzindo: ${appName}`;
    }

    setTimeout(showMenu, 500);
  }

  function closePlayer() {
    playerOverlay.classList.remove('active');
    hideMenu();
    videoPlayer.pause();
    videoPlayer.src = '';
    if (hls) {
      hls.destroy();
      hls = null;
    }
    document.querySelector('.app-card')?.focus();
  }

  backHomeBtn.addEventListener('click', closePlayer);
  backHomeBtn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ' || e.keyCode === 13 || e.keyCode === 32) {
      e.preventDefault();
      e.stopPropagation();
      closePlayer();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (!playerOverlay.classList.contains('active')) return;

    if (e.key === 'Escape' || e.key === 'Backspace' || e.keyCode === 461 || e.keyCode === 8) {
      e.preventDefault();
      e.stopPropagation();
      closePlayer();
      return;
    }

    if (!playerMenu.classList.contains('active')) {
      if (e.key === 'Enter' || e.keyCode === 13 || e.key === 'ArrowDown' || e.keyCode === 40 || e.key === 'ArrowUp' || e.keyCode === 38) {
        e.preventDefault();
        e.stopPropagation();
        showMenu();
        return;
      }
    }

    if (playerMenu.classList.contains('active')) {
      if (e.key.startsWith('Arrow') || (e.keyCode >= 37 && e.keyCode <= 40)) {
        e.preventDefault();
        e.stopPropagation();
        hideMenu();
      }
    }
  });

  videoPlayer.addEventListener('click', showMenu);

  let mouseTimeout;
  playerOverlay.addEventListener('mousemove', () => {
    showMenu();
    clearTimeout(mouseTimeout);
    mouseTimeout = setTimeout(hideMenu, 2000);
  });

  playerOverlay.addEventListener('click', (e) => {
    if (e.target === playerOverlay) closePlayer();
  });

  document.querySelectorAll('.app-card,.banner-btn').forEach(card => {
    card.addEventListener('click', () => {
      const url = card.getAttribute('data-url');
      const isStream = card.hasAttribute('data-stream') || card.classList.contains('banner-btn');
      if (!url ||!isStream) return;

      const name = card.querySelector('.app-name')?.textContent.trim()
                || card.querySelector('.app-icon')?.textContent.trim()
                || 'Canal';
      openPlayer(url, name);
    });
  });

  const cards = Array.from(document.querySelectorAll('.app-card'));
  cards.forEach((card, idx) => {
    card.addEventListener('keydown', e => {
      let nextIdx = idx;
      const cols = Math.floor(window.innerWidth / 180);

      if (e.key === 'ArrowRight' && idx < cards.length - 1) nextIdx = idx + 1;
      if (e.key === 'ArrowLeft' && idx > 0) nextIdx = idx - 1;
      if (e.key === 'ArrowDown') nextIdx = Math.min(idx + cols, cards.length - 1);
      if (e.key === 'ArrowUp') nextIdx = Math.max(idx - cols, 0);
      if (e.key === 'Enter' || e.key === ' ') card.click();

      if (nextIdx!== idx) {
        e.preventDefault();
        cards[nextIdx].focus();
      }
    });
  });

  // MENU LATERAL
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');
  const sidebarClose = document.getElementById('sidebarClose');

  function openSidebar() {
    sidebar.classList.add('active');
    sidebarOverlay.classList.add('active');
  }

  function closeSidebar() {
    sidebar.classList.remove('active');
    sidebarOverlay.classList.remove('active');
    document.querySelectorAll('.submenu').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.sidebar-arrow').forEach(a => a.textContent = '▶');
  }

  menuToggle.addEventListener('click', openSidebar);
  sidebarClose.addEventListener('click', closeSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  // SUBMENU
  document.querySelectorAll('.sidebar-item[data-submenu]').forEach(item => {
    item.addEventListener('click', () => {
      const submenuId = item.getAttribute('data-submenu');
      const submenu = document.getElementById(`submenu-${submenuId}`);
      const arrow = item.querySelector('.sidebar-arrow');
      
      submenu.classList.toggle('active');
      item.classList.toggle('active');
      arrow.textContent = submenu.classList.contains('active') ? '▼' : '▶';
    });
  });

  // CLIQUE NOS ITENS DO SUBMENU - AGORA ABRE LINK
  document.querySelectorAll('.submenu-item[data-link]').forEach(item => {
    item.addEventListener('click', () => {
      const link = item.getAttribute('data-link');
      if (link) {
        window.open(link, '_blank');
      }
      closeSidebar();
    });
  });

  // Carrega foto do banner
  const banner = document.querySelector('.banner[data-bg]');
  if (banner) {
    const bgUrl = banner.getAttribute('data-bg');
    banner.style.setProperty('--banner-img', `url(${bgUrl})`);
  }

  // Carrega fotos dos cards
  document.querySelectorAll('.app-card[data-img]').forEach(card => {
    const imgUrl = card.getAttribute('data-img');
    card.style.setProperty('--card-img', `url(${imgUrl})`);
  });
</script>
</body>
</html>
