<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICI</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
  
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Roboto', sans-serif;
    /* FUNDO NOVO - GRADIENTE LIMPO ESTILO ANDROID TV */
    background: radial-gradient(ellipse at top, #1a1d29 0%, #0a0e14 50%, #000000 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 40px 60px;
    position: relative;
  }
  
  /* Brilho sutil no fundo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 30%, rgba(0, 150, 255, 0.08), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.08), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  
  .tv-container {
    position: relative;
    z-index: 1;
    max-width: 1920px;
    margin: 0 auto;
  }
  
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 50px;
  }
  
  .logo {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(90deg, #00d4ff, #0099ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 8px rgba(0, 212, 255, 0.3));
  }
  
  .header-info {
    display: flex;
    gap: 30px;
    align-items: center;
  }
  
  .time {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 1px;
  }
  
  .weather {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 24px;
    opacity: 0.9;
  }
  
  .section-title {
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }
  
  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 24px;
    margin-bottom: 60px;
  }
  
  .app-card {
    aspect-ratio: 16/9;
    background: rgba(30, 30, 40, 0.7);
    backdrop-filter: blur(40px) saturate(180%);
    border-radius: 16px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  
  .app-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: 0.3s;
  }
  
  .app-card:hover {
    transform: scale(1.05);
    border-color: #00d4ff;
    box-shadow: 0 0 40px rgba(0, 212, 255, 0.4), 0 8px 32px rgba(0, 0, 0, 0.6);
  }
  
  .app-card:hover::before {
    opacity: 1;
  }
  
  .app-card:focus {
    outline: 3px solid #00d4ff;
    outline-offset: 4px;
    transform: scale(1.05);
  }
  
  .app-icon {
    font-size: 56px;
    margin-bottom: 12px;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
  }
  
  .app-name {
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
  }
  
  .netflix { background: linear-gradient(135deg, #E50914, #B20710); }
  .youtube { background: linear-gradient(135deg, #FF0000, #CC0000); }
  .prime { background: linear-gradient(135deg, #00A8E1, #0077B6); }
  .globoplay { background: linear-gradient(135deg, #FF6B35, #F7931E); }
  .disney { background: linear-gradient(135deg, #113CCF, #0A1F44); }
  .spotify { background: linear-gradient(135deg, #1DB954, #1AA34A); }
  
  .banner {
    width: 100%;
    height: 400px;
    background: rgba(30, 30, 40, 0.5);
    backdrop-filter: blur(30px) saturate(180%);
    border-radius: 20px;
    margin-bottom: 50px;
    display: flex;
    align-items: center;
    padding: 60px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  
  .banner-content {
    max-width: 600px;
    z-index: 1;
  }
  
  .banner-title {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  
  .banner-desc {
    font-size: 18px;
    opacity: 0.9;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  
  .banner-btn {
    padding: 14px 32px;
    background: linear-gradient(135deg, #00d4ff, #0099ff);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
  }
  
  .banner-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6);
  }
  
  .app-card:focus-visible {
    outline: 4px solid #00d4ff;
    outline-offset: 6px;
  }
  
  /* PLAYER M3U8 */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  
  .player-overlay.active {
    display: flex;
  }
  
  .player-wrapper {
    width: 90%;
    max-width: 1600px;
    aspect-ratio: 16/9;
    position: relative;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(0, 212, 255, 0.3);
  }
  
  #videoPlayer {
    width: 100%;
    height: 100%;
    background: #000;
  }
  
  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    z-index: 10000;
  }
  
  .close-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.1);
  }
  
  .player-info {
    color: #fff;
    margin-top: 20px;
    font-size: 18px;
    opacity: 0.8;
  }
  
  @media (max-width: 1280px) {
    body { padding: 30px 40px; }
    .apps-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
    .banner { height: 320px; padding: 40px; }
    .banner-title { font-size: 36px; }
  }
</style>
</head>
<body>
  <div class="tv-container">
    <div class="header">
      <div class="logo">ICI</div>
      <div class="header-info">
        <div class="time" id="time">20:45</div>
        <div class="weather">☀️ 28°C</div>
      </div>
    </div>
    
    <div class="banner">
      <div class="banner-content">
        <h1 class="banner-title">Destaque da Semana</h1>
        <p class="banner-desc">Assista aos melhores filmes e séries. Novos lançamentos toda semana.</p>
        <button class="banner-btn" data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">Assistir Agora</button>
      </div>
    </div>
    
    <h2 class="section-title">Canais</h2>
    <div class="apps-grid">
      <div class="app-card netflix" tabindex="0" data-url="https://d25usgadhphvwi.cloudfront.net/hls/stv-plus-640x360/playlist.m3u8">
        <div class="app-icon">CNN</div>
        <div class="app-name"></div>
      </div>
      
      <div class="app-card youtube" tabindex="0" data-url="https://d03ae6b5c6724c24867e97a3dc04934a.mediatailor.us-west-2.amazonaws.com/v1/master/ba62fe743df0fe93366eba3a257d792884136c7f/LINEAR-1026-WORBBRPTFAST-WHALETVPLUS/1026/hls/master/playlist.m3u8">
        <div class="app-icon">Sport</div>
        <div class="app-name">RED BULL</div>
      </div>
      
      <div class="app-card prime" tabindex="0" data-url="https://cdn-5.nxplay.com.br/VEJA_PLUS_FAST/tracks-v1a1/mono.ts.m3u8">
        <div class="app-icon">VEJA</div>
        <div class="app-name"></div>
      </div>
      
      <div class="app-card globoplay" tabindex="0" data-url="https://test-streams.mux.dev/x36xhzz.m3u8">
        <div class="app-icon">G</div>
        <div class="app-name">Globoplay</div>
      </div>
      
      <div class="app-card disney" tabindex="0" data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">
        <div class="app-icon">D+</div>
        <div class="app-name">Disney+</div>
      </div>
      
      <div class="app-card spotify" tabindex="0" data-url="https://test-streams.mux.dev/x36xhzz.m3u8">
        <div class="app-icon">♪</div>
        <div class="app-name">Spotify</div>
      </div>
    </div>
  </div>

  <!-- PLAYER OVERLAY -->
  <div class="player-overlay" id="playerOverlay">
    <button class="close-btn" id="closeBtn">×</button>
    <div class="player-wrapper">
      <video id="videoPlayer" controls autoplay></video>
    </div>
    <div class="player-info" id="playerInfo">Reproduzindo...</div>
  </div>

<script>
  // Atualiza hora
  function updateTime() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('time').textContent = `${hours}:${minutes}`;
  }
  updateTime();
  setInterval(updateTime, 60000);
  
  // PLAYER M3U8
  const playerOverlay = document.getElementById('playerOverlay');
  const videoPlayer = document.getElementById('videoPlayer');
  const closeBtn = document.getElementById('closeBtn');
  const playerInfo = document.getElementById('playerInfo');
  let hls = null;
  
  // Função pra abrir player com m3u8
  function openPlayer(url, appName) {
    playerOverlay.classList.add('active');
    playerInfo.textContent = `Reproduzindo: ${appName}`;
    
    if (Hls.isSupported()) {
      if (hls) hls.destroy();
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(videoPlayer);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        videoPlayer.play();
      });
    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari nativo
      videoPlayer.src = url;
      videoPlayer.play();
    }
  }
  
  // Fecha player
  function closePlayer() {
    playerOverlay.classList.remove('active');
    videoPlayer.pause();
    videoPlayer.src = '';
    if (hls) {
      hls.destroy();
      hls = null;
    }
  }
  
  closeBtn.addEventListener('click', closePlayer);
  
  // ESC fecha player
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && playerOverlay.classList.contains('active')) {
      closePlayer();
    }
  });
  
  // Clique nos apps
  document.querySelectorAll('.app-card, .banner-btn').forEach(card => {
    card.addEventListener('click', () => {
      const url = card.getAttribute('data-url');
      const name = card.querySelector('.app-name')?.textContent || 'Vídeo';
      if (url) {
        openPlayer(url, name);
      }
    });
  });
</script>
</body>
</html>
