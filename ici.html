<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICITV - Carregando...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }

    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease-out;
    }

    .loader-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* Anel giratório azul brilhando */
    .spinner {
      width: 120px;
      height: 120px;
      border: 3px solid rgba(0, 150, 255, 0.1);
      border-top: 3px solid #0096ff;
      border-right: 3px solid #00d4ff;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      box-shadow: 0 0 30px #0096ff, 
                  0 0 60px #0096ff,
                  inset 0 0 20px rgba(0, 150, 255, 0.3);
      position: relative;
    }

    .spinner::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top: 3px solid #00ffff;
      animation: spin 2s linear infinite reverse;
      filter: blur(2px);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Logo ICITV brilhando */
    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 8px;
      color: #0096ff;
      text-shadow: 0 0 10px #0096ff,
                   0 0 20px #0096ff,
                   0 0 40px #0096ff,
                   0 0 80px #00d4ff;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { 
        opacity: 1;
        text-shadow: 0 0 10px #0096ff,
                     0 0 20px #0096ff,
                     0 0 40px #0096ff,
                     0 0 80px #00d4ff;
      }
      50% { 
        opacity: 0.8;
        text-shadow: 0 0 20px #0096ff,
                     0 0 40px #0096ff,
                     0 0 60px #00d4ff,
                     0 0 100px #00ffff;
      }
    }

    /* Partículas de fundo */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #0096ff;
      border-radius: 50%;
      box-shadow: 0 0 10px #0096ff;
      animation: float 6s infinite;
      opacity: 0;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(1);
        opacity: 0;
      }
    }

    /* Texto de carregamento */
    .loading-text {
      color: #0096ff;
      font-size: 14px;
      letter-spacing: 4px;
      opacity: 0.7;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="particles" id="particles"></div>
    <div class="loader-container">
      <div class="spinner"></div>
      <div class="logo">ICITV</div>
      <div class="loading-text">CARREGANDO...</div>
    </div>
  </div>

  <script>
    // Cria partículas de fundo
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 6 + 's';
      particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
      particlesContainer.appendChild(particle);
    }

    // Controla o loading e redirecionamento
    document.addEventListener('DOMContentLoaded', () => {
      document.body.style.overflow = 'hidden';
      
      // 5 segundos de loading
      setTimeout(() => {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0'; // some suave
        
        // Espera a animação de fade terminar e redireciona
        setTimeout(() => {
          // TROQUE A URL ABAIXO PELA PÁGINA QUE VOCÊ QUER ABRIR
          window.location.href = 'https://longer-thumb-reuters-drill.trycloudflare.com/ICI/storage/smart-tv/ICTV.html'; 
          
          // Se quiser abrir em nova aba, use essa linha ao invés:
          // window.open('https://google.com', '_blank');
        }, 800);
        
      }, 5000); // 5000ms = 5 segundos
    });
  </script>
</body>
</html>
