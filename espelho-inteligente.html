<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-out {
            animation: fadeOut 0.6s ease-in forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #ffffff;
            border-radius: 3px;
            animation: progressFill 3s ease-out forwards;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes progressFill {
            from { width: 0%; }
            to { width: 100%; }
        }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .pulse-ring {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        @media (max-width: 640px) {
            .spinner {
                width: 48px;
                height: 48px;
                border-width: 3px;
            }
            .progress-bar {
                width: 160px;
            }
            .pulse-ring {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body class="gradient-bg">
    <div id="loader" class="min-h-screen w-full flex items-center justify-center px-4 fade-in">
        <div class="flex flex-col items-center gap-8">
            <!-- Spinner with pulse effect -->
            <div class="relative flex items-center justify-center">
                <div class="pulse-ring"></div>
                <div class="pulse-ring" style="animation-delay: 1s;"></div>
                <div class="spinner"></div>
            </div>

            <!-- Text -->
            <div class="text-center space-y-4">
                <h1 class="text-white text-2xl sm:text-3xl font-medium tracking-tight">
                    Carregando<span class="dots"></span>
                </h1>
                <p class="text-white/70 text-sm sm:text-base font-light">
                    Preparando sua experiência
                </p>
            </div>

            <!-- Progress bar -->
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Aguarda o carregamento completo da página
        window.addEventListener('load', function() {
            const loader = document.getElementById('loader');
            
            // Após 3 segundos, inicia o fade-out e redireciona
            setTimeout(function() {
                loader.classList.remove('fade-in');
                loader.classList.add('fade-out');
                
                // Redireciona após a animação de fade-out terminar
                setTimeout(function() {
                    window.location.href = 'https://holland-pension-vid-evaluations.trycloudflare.com/ICI/storage/smart-tv/inteligente/';
                }, 600);
            }, 3000);
        });

        // Previne flash de conteúdo não estilizado
        document.body.style.visibility = 'visible';
    </script>
</body>
</html>
